services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.108.2
    restart: unless-stopped
    ports: ["5678:5678"]
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/project
    depends_on:
      - scraper

  scraper:
    image: mcr.microsoft.com/playwright:v1.55.0-noble
    restart: unless-stopped
    working_dir: /project
    command:  bash -lc "npm ci || npm i && npm run build && npm run start:scraper"
    volumes:
      - ./:/project
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/run || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  n8n_data: {}
